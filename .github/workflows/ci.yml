name: CI

on:
  push:
  pull_request:

jobs:
  nix:
    runs-on: ubuntu-latest
    env:
      NIX_OVERRIDES: >-
        --override-input nix-secrets path:./.ci/nix-secrets
        --override-input bootstrap-keys path:./.ci/bootstrap-keys
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache
          sudo apt-get clean

      - name: Install formatter tooling
        run: |
          nix profile install \
            nixpkgs#pre-commit \
            nixpkgs#alejandra \
            nixpkgs#stylua

      - name: Pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Eval flake outputs
        run: |
          nix flake show --all-systems $NIX_OVERRIDES
          nix eval .#packages.x86_64-linux --apply builtins.attrNames $NIX_OVERRIDES >/dev/null
          nix eval .#packages.aarch64-linux --apply builtins.attrNames $NIX_OVERRIDES >/dev/null
          nix eval .#checks.x86_64-linux --apply builtins.attrNames $NIX_OVERRIDES >/dev/null
          nix eval .#checks.aarch64-linux --apply builtins.attrNames $NIX_OVERRIDES >/dev/null

      - name: Build x86_64 checks and key packages
        run: |
          USERNAME=$(nix eval --raw --impure --expr 'let const = import ./globals.nix; in const.username')
          nix build \
            .#checks.x86_64-linux \
            .#packages.x86_64-linux.nvim \
            .#homeConfigurations.\"${USERNAME}@earthy\".activationPackage \
            $NIX_OVERRIDES

      - name: Instantiate aarch64 checks and key packages
        run: |
          nix build \
            .#checks.aarch64-linux \
            .#packages.aarch64-linux.nvim \
            --dry-run \
            $NIX_OVERRIDES

      - name: Home checks
        run: |
          USERNAME=$(nix eval --raw --impure --expr 'let const = import ./globals.nix; in const.username')
          nix eval --json .#homeConfigurations.\"${USERNAME}@earthy\".config.programs.neovim.enable $NIX_OVERRIDES | jq -e '. == true'
          nix eval --json .#homeConfigurations.\"${USERNAME}@earthy\".config.xdg.configFile.nvim.source $NIX_OVERRIDES | jq -e 'type == "string"'
