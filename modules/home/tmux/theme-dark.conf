if-shell 'test -n "$SSH_CONNECTION"' \
  'set -g status-left " #{?client_prefix,^ ,}#[fg=#f4bf75]#(whoami)#[fg=#9ece6a]@#[fg=#62d8f1]#H #[fg=#2b2a30,bg=default]#[fg=#b4befe,bg=default]#S#[fg=#2b2a30,bg=default] #[fg=#dfdcd8,bg=default]#(~/.local/bin/tmux/truncate_path.sh #{pane_current_path})"' \
  'set -g status-left " #{?client_prefix,^ ,}#[fg=#9ece6a]local #[fg=#2b2a30,bg=default]#[fg=#b4befe,bg=default]#S#[fg=#2b2a30,bg=default] #[fg=#dfdcd8,bg=default]#(~/.local/bin/tmux/truncate_path.sh #{pane_current_path})"'
set-hook -g client-attached 'if-shell "test -n \"$SSH_CONNECTION\"" "set -g status-left \" #{?client_prefix,^ ,}#[fg=#f4bf75]#(whoami)#[fg=#9ece6a]@#[fg=#62d8f1]#H #[fg=#2b2a30,bg=default]#[fg=#b4befe,bg=default]#S#[fg=#2b2a30,bg=default] #[fg=#dfdcd8,bg=default]#(~/.local/bin/tmux/truncate_path.sh #{pane_current_path})\"" "set -g status-left \" #{?client_prefix,^ ,}#[fg=#9ece6a]local #[fg=#2b2a30,bg=default]#[fg=#b4befe,bg=default]#S#[fg=#2b2a30,bg=default] #[fg=#dfdcd8,bg=default]#(~/.local/bin/tmux/truncate_path.sh #{pane_current_path})\""'

set -g status-right '#(TMUX_WORKBENCH_SESSION="#{session_name}" ~/.local/bin/tmux/workbench.sh status-sync)#[fg=#5fb3c4,bg=default,bold]#{?window_zoomed_flag,+, } #[fg=#b4befe,nobold]#(cpu) #[fg=#b4befe]#(memory) #[bg=default]#(battery)#(~/.local/bin/tmux/battery-time.sh) #[fg=#daeafa,nobold]%H:%M'
# set -g status-right '#[fg=#4fc1ff,bg=default,bold]#{?window_zoomed_flag,+, }#[fg=#b4befe,nobold] #(duo status)#(cpu) #[fg=#b4befe]#(memory) #[bg=default]#(battery) #[fg=#daeafa,nobold]%H:%M'
# set -g status-right '#[fg=#4fc1ff,bg=default,bold]#{?window_zoomed_flag,+, }#[fg=#daeafa,nobold]%H:%M #[bg=default]'
# set -g status-right '#[fg=#4fc1ff,bg=default,bold]#{?window_zoomed_flag,+, }#[fg=#b4befe,bold]#[nobold] #[nobold]#(duo status)#(cpu) #(memory) #[bg=default]#(battery) #[fg=#a9b1d6,bg=default,nobold,noitalics]#(forecast) #[fg=#daeafa,nobold]%H:%M #[bg=default]'
# set -g status-right '#[fg=#4fc1ff,bg=default,bold]#{?window_zoomed_flag,+, }#[fg=#b4befe,bold]#[nobold] #[nobold]#(duo status)#(cpu) #(memory) #[bg=default]#(battery) #[fg=#a9b1d6,bg=default,nobold,noitalics]#(forecast) #[fg=#daeafa,nobold]%H:%M #[bg=default]'
set -g @workbench-agent-window-number-style '#{?#{||:#{==:#{@agent-state},waiting},#{==:#{@agent-state},needs-input}},fg=#d6a65d,#{?#{||:#{==:#{@agent-state},blocked},#{==:#{@agent-state},error}},fg=#ff5c57,#{?#{==:#{@agent-state},done},fg=#9ece6a,#{?#{||:#{==:#{@agent-state},running},#{==:#{@agent-state},busy}},fg=#5fb3c4,#{?#{||:#{==:#{@agent-state},idle},#{==:#{@agent-state},ready}},fg=#5c626e,#{?window_bell_flag,fg=#d6a65d,#{?window_activity_flag,fg=#5fb3c4,fg=#5c626e}}}}}}}'
set -g @workbench-agent-window-current-number-style '#{?#{||:#{==:#{@agent-state},waiting},#{==:#{@agent-state},needs-input}},fg=#d6a65d,#{?#{||:#{==:#{@agent-state},blocked},#{==:#{@agent-state},error}},fg=#ff5c57,#{?#{==:#{@agent-state},done},fg=#9ece6a,#{?#{||:#{==:#{@agent-state},running},#{==:#{@agent-state},busy}},fg=#5fb3c4,#{?#{||:#{==:#{@agent-state},idle},#{==:#{@agent-state},ready}},fg=#5c626e,fg=#ae81ff}}}}}'
set -g window-status-current-style 'fg=#78aebd,bg=default'
set -g window-status-format '#[#{E:@workbench-agent-window-number-style},bg=default,italics,#{?#{@agent-home-session},underscore,nounderscore}]#I#[#{E:@workbench-agent-window-number-style},bg=default,italics,nounderscore]: #[fg=#5c626e,bg=default,noitalics,bold,nounderscore]#W#[fg=#2b2a30,bg=default,nounderscore] '
set -g window-status-current-format '#[#{E:@workbench-agent-window-current-number-style},bg=default,italics,#{?#{@agent-home-session},underscore,nounderscore}]#I#[#{E:@workbench-agent-window-current-number-style},bg=default,italics,nounderscore]: #[fg=#dfdcd8,bg=default,bold,noitalics,nounderscore]#W#[fg=#2b2a30,bg=default,nounderscore] '
set -g window-status-last-style 'fg=#a9b1d6,bg=default'
set -g window-status-activity-style 'fg=#5fb3c4,bg=default'
set -g window-status-bell-style 'fg=#d6a65d,bg=default'
set -g pane-border-style 'fg=#b4befe'
set -g pane-active-border-style 'fg=#b4befe'
set -g message-command-style "bg=default,fg=#a9b1d6"
set -g message-style "bg=default,fg=#a9b1d6"
set -g mode-style "bg=#292e42"
