################# Plugin Settings  #########################
set -sg escape-time 0

bind-key -T copy-mode-vi WheelUpPane send -N1 -X scroll-up
bind-key -T copy-mode-vi WheelDownPane send -N1 -X scroll-down

################# KEY BINDS  #########################
# unbind C-b
# set -g prefix C-f

# Smart pane switching with awareness of Neovim splits.
bind -n M-h if -F "#{@pane-is-vim}" 'send-keys M-h'  { if -F '#{pane_at_left}' "" 'select-pane -L'}
bind -n M-j if -F "#{@pane-is-vim}" 'send-keys M-j'  { if -F '#{pane_at_bottom}' '' 'select-pane -D'}
bind -n M-k if -F "#{@pane-is-vim}" 'send-keys M-k'  { if -F '#{pane_at_top}' '' 'select-pane -U'}
bind -n M-l if -F "#{@pane-is-vim}" 'send-keys M-l'  { if -F '#{pane_at_right}' '' 'select-pane -R'}

# Smart pane resizing with awareness of Neovim splits.
bind -n M-H if -F "#{@pane-is-vim}" 'send-keys M-H' 'resize-pane -L 3'
bind -n M-J if -F "#{@pane-is-vim}" 'send-keys M-J' 'resize-pane -D 3'
bind -n M-K if -F "#{@pane-is-vim}" 'send-keys M-K' 'resize-pane -U 3'
bind -n M-L if -F "#{@pane-is-vim}" 'send-keys M-L' 'resize-pane -R 3'
bind -n C-H if -F "#{@pane-is-vim}" 'send-keys M-H' 'resize-pane -L 3'
bind -n C-J if -F "#{@pane-is-vim}" 'send-keys M-J' 'resize-pane -D 3'
bind -n C-K if -F "#{@pane-is-vim}" 'send-keys M-K' 'resize-pane -U 3'
bind -n C-L if -F "#{@pane-is-vim}" 'send-keys M-L' 'resize-pane -R 3'

tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind -n 'C-\\' if -F \"#{@pane-is-vim}\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind -n 'C-\\' if -F \"#{@pane-is-vim}\" 'send-keys C-\\\\'  'select-pane -l'"

bind -T copy-mode-vi 'M-h' if -F '#{pane_at_left}' '' 'select-pane -L'
bind -T copy-mode-vi 'M-j' if -F '#{pane_at_bottom}' '' 'select-pane -D'
bind -T copy-mode-vi 'M-k' if -F '#{pane_at_top}' '' 'select-pane -U'
bind -T copy-mode-vi 'M-l' if -F '#{pane_at_right}' '' 'select-pane -R'
bind -T copy-mode-vi 'C-\' select-pane -l

bind r source-file ~/.config/tmux/tmux.conf
bind -n "M-'" switch-client -l
bind -n "M-;" last-window

bind -n M-Space if -F '#{!=:#{@task-root},}' 'run-shell -b "TMUX_WORKBENCH_WINDOW=\"#{window_id}\" TMUX_WORKBENCH_PANE=\"#{pane_id}\" ~/.local/bin/tmux/workbench.sh pair-toggle"' 'run-shell -b "TMUX_WORKBENCH_WINDOW=\"#{window_id}\" TMUX_WORKBENCH_PANE=\"#{pane_id}\" ~/.local/bin/tmux/pane-manager.sh terminal"'
bind Space run-shell -b "~/.local/bin/tmux/pane-manager.sh terminal"
bind -n M-d run-shell -b "TMUX_WORKBENCH_WINDOW='#{window_id}' TMUX_WORKBENCH_PANE='#{pane_id}' ~/.local/bin/tmux/workbench.sh terminal"
unbind -n M-=
unbind =
unbind -n M-g
unbind g
unbind -n M-G
unbind G
bind -n M-a run-shell "~/.local/bin/tmux/pane-manager.sh close"
bind a run-shell "~/.local/bin/tmux/pane-manager.sh close"
bind -n M-A run-shell "~/.local/bin/tmux/workbench.sh close-window"
bind -n M-Enter run-shell "~/.local/bin/tmux/workbench.sh new"
bind Enter run-shell "~/.local/bin/tmux/workbench.sh new"

bind -n M-i display-popup -w 92% -h 85% -E "~/.local/bin/tmux/windowizer.sh"
bind i display-popup -w 92% -h 85% -E "~/.local/bin/tmux/windowizer.sh"
bind C-i display-popup -w 92% -h 85% -E "~/.local/bin/tmux/windowizer.sh"
bind -n M-y run-shell -b "~/.local/bin/tmux/last-command.sh copy"
bind y run-shell -b "~/.local/bin/tmux/last-command.sh copy"
bind -n M-Y run-shell -b "~/.local/bin/tmux/last-command.sh paste-last-pane"
bind Y run-shell -b "~/.local/bin/tmux/last-command.sh paste-last-pane"
bind -n M-C-y display-popup -E "~/.local/bin/tmux/history-edit.sh '#{pane_id}'"
bind C-y display-popup -E "~/.local/bin/tmux/history-edit.sh '#{pane_id}'"
bind -n M-x run-shell "~/.local/bin/tmux/stack_close.sh"
bind x run-shell "~/.local/bin/tmux/stack_close.sh"

bind C-p previous-window
bind p previous-window
bind C-n next-window
bind n next-window
bind C-f send-prefix

bind -n M-Q run-shell "~/.local/bin/tmux/pane-manager.sh move-window 1"
bind -n M-W run-shell "~/.local/bin/tmux/pane-manager.sh move-window 2"
bind -n M-E run-shell "~/.local/bin/tmux/pane-manager.sh move-window 3"
bind -n M-R run-shell "~/.local/bin/tmux/pane-manager.sh move-window 4"
bind -n M-T run-shell "~/.local/bin/tmux/pane-manager.sh move-window 5"
bind -n C-Q run-shell "~/.local/bin/tmux/pane-manager.sh move-window 1"
bind -n C-W run-shell "~/.local/bin/tmux/pane-manager.sh move-window 2"
bind -n C-E run-shell "~/.local/bin/tmux/pane-manager.sh move-window 3"
bind -n C-R run-shell "~/.local/bin/tmux/pane-manager.sh move-window 4"
bind -n C-T run-shell "~/.local/bin/tmux/pane-manager.sh move-window 5"

bind -n M-q if-shell "tmux list-windows | grep -q '^1:'" "select-window -t 1" ""
bind -n M-w if-shell "tmux list-windows | grep -q '^2:'" "select-window -t 2" ""
bind -n M-e if-shell "tmux list-windows | grep -q '^3:'" "select-window -t 3" ""
bind -n M-r if-shell "tmux list-windows | grep -q '^4:'" "select-window -t 4" ""
bind -n M-t if-shell "tmux list-windows | grep -q '^5:'" "select-window -t 5" ""
bind -r C-q if-shell "tmux list-windows | grep -q '^1:'" "select-window -t 1" ""
bind -r C-w if-shell "tmux list-windows | grep -q '^2:'" "select-window -t 2" ""
bind -r C-e if-shell "tmux list-windows | grep -q '^3:'" "select-window -t 3" ""
bind -r C-r if-shell "tmux list-windows | grep -q '^4:'" "select-window -t 4" ""
bind -r C-t if-shell "tmux list-windows | grep -q '^5:'" "select-window -t 5" ""

bind -n M-f run-shell -b "TMUX_WORKBENCH_WINDOW='#{window_id}' TMUX_WORKBENCH_PANE='#{pane_id}' ~/.local/bin/tmux/workbench.sh primary agent"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r C-h select-pane -L
bind -r C-j select-pane -D
bind -r C-k select-pane -U
bind -r C-l select-pane -R

bind -n PageUp copy-mode -u
bind -n PageDown copy-mode
bind -n M-, run-shell "~/.local/bin/tmux/pane-manager.sh swap-next"
bind -n M-. run-shell "~/.local/bin/tmux/pane-manager.sh swap-prev"
bind t run-shell "~/.local/bin/tmux/pane-manager.sh layout"
# bind -n M-r rotate-window
bind -n M-n next
bind -n M-p prev

bind -n M-s run-shell -b "TMUX_WORKBENCH_WINDOW='#{window_id}' TMUX_WORKBENCH_PANE='#{pane_id}' ~/.local/bin/tmux/workbench.sh primary editor"
bind -n M-0 run-shell -b "~/.local/bin/tmux/workbench.sh layout"
bind -n M-m run-shell -b "TMUX_WORKBENCH_PANE='#{pane_id}' ~/.local/bin/tmux/workbench.sh main"
bind -n M-u run-shell "~/.local/bin/tmux/agent-workflow.sh link"
bind u run-shell "~/.local/bin/tmux/agent-workflow.sh link"
bind -n M-o run-shell -b "~/.local/bin/tmux/workbench.sh next-agent"
bind o run-shell -b "~/.local/bin/tmux/workbench.sh next-agent"
unbind -n M-O
unbind O
bind U run-shell "~/.local/bin/tmux/agent-workflow.sh unlink"

set-hook -g after-rename-window[90] 'run-shell -b "~/.local/bin/tmux/workbench.sh event \"#{session_name}\""'
set-hook -g window-linked[90] 'run-shell -b "~/.local/bin/tmux/workbench.sh event \"#{session_name}\""'
set-hook -g window-unlinked[90] 'run-shell -b "~/.local/bin/tmux/workbench.sh event \"#{session_name}\""'
set-hook -g window-linked[91] 'run-shell -b "~/.local/bin/tmux/workbench.sh sync-paired-terminals \"#{session_name}\""'
set-hook -g window-unlinked[91] 'run-shell -b "~/.local/bin/tmux/workbench.sh sync-paired-terminals \"#{session_name}\""'
set-hook -g window-unlinked[92] 'run-shell -b "~/.local/bin/tmux/workbench.sh cleanup"'

unbind-key -T copy-mode-vi v
bind-key -T copy-mode-vi 'v' send -X begin-selection     # Begin selection in copy mode.
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle  # Begin selection in copy mode.
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel '~/.local/bin/tmux/copy-to-clipboard.sh'
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel '~/.local/bin/tmux/copy-to-clipboard.sh'

################# General Options  #########################
set-option -g set-clipboard on
set -gq allow-passthrough all
set -as terminal-features ',xterm-ghostty:clipboard'
set -gq allow-rename off
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set -ga update-environment SSH_CONNECTION
set -ga update-environment SSH_CLIENT
set -ga update-environment SSH_TTY

set -g other-pane-width "50%"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g visual-activity off
set -g visual-bell off
set -g activity-action other
set -g bell-action other
set -g set-titles on
set -g set-titles-string '#H:#S.#I.#P #W #T'
# set -g renumber-windows off
setw -g xterm-keys on # for vim
setw -g monitor-activity on
setw -g monitor-bell on
setw -g automatic-rename off

## undercurl support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
# support colors for undercurl
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
