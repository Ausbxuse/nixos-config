if-shell 'test -n "$SSH_CONNECTION"' \
  'set -g status-left " #{?client_prefix,^ ,}#[fg=#fe640b]#(whoami)#[fg=#40a02b]@#[fg=#1e66f5]#H #[fg=#bcc0cc,bg=default]#[fg=#1e66f5,bg=default]#S#[fg=#bcc0cc,bg=default] #[fg=#4c4f69,bg=default]#(~/.local/bin/tmux/truncate_path.sh #{pane_current_path})"' \
  'set -g status-left " #{?client_prefix,^ ,}#[fg=#40a02b]local #[fg=#bcc0cc,bg=default]#[fg=#1e66f5,bg=default]#S#[fg=#bcc0cc,bg=default] #[fg=#4c4f69,bg=default]#(~/.local/bin/tmux/truncate_path.sh #{pane_current_path})"'
set-hook -g client-attached 'if-shell "test -n \"$SSH_CONNECTION\"" "set -g status-left \" #{?client_prefix,^ ,}#[fg=#fe640b]#(whoami)#[fg=#40a02b]@#[fg=#1e66f5]#H #[fg=#bcc0cc,bg=default]#[fg=#1e66f5,bg=default]#S#[fg=#bcc0cc,bg=default] #[fg=#4c4f69,bg=default]#(~/.local/bin/tmux/truncate_path.sh #{pane_current_path})\"" "set -g status-left \" #{?client_prefix,^ ,}#[fg=#40a02b]local #[fg=#bcc0cc,bg=default]#[fg=#1e66f5,bg=default]#S#[fg=#bcc0cc,bg=default] #[fg=#4c4f69,bg=default]#(~/.local/bin/tmux/truncate_path.sh #{pane_current_path})\""'

# set -g status-right "#[fg=#4c4f69,bg=default,bold]#{?window_zoomed_flag,+, }#[fg=#1487d6] #(duo status)#(cpu) #[fg=#1487d6]#(memory) #[bg=default]#(battery) #[fg=#1f232e,nobold]%H:%M"
set -g status-right '#(TMUX_WORKBENCH_SESSION="#{session_name}" ~/.local/bin/tmux/workbench.sh status-sync)#[fg=#4c4f69,bg=default,bold]#{?window_zoomed_flag,+, } #[fg=#1487d6]#(cpu) #[fg=#1487d6]#(memory) #[bg=default]#(battery)#(~/.local/bin/tmux/battery-time.sh) #[fg=#1f232e,nobold]%H:%M'
set -g status-right-style 'fg=#4c4f69,bg=default'
set -g @workbench-agent-window-number-style '#{?#{||:#{==:#{@agent-state},waiting},#{==:#{@agent-state},needs-input}},fg=#d6a65d,#{?#{||:#{==:#{@agent-state},blocked},#{==:#{@agent-state},error}},fg=#ff5c57,#{?#{==:#{@agent-state},done},fg=#9ece6a,#{?#{||:#{==:#{@agent-state},running},#{==:#{@agent-state},busy}},fg=#5fb3c4,#{?#{||:#{==:#{@agent-state},idle},#{==:#{@agent-state},ready}},fg=#bcc0cc,#{?window_bell_flag,fg=#d6a65d,#{?window_activity_flag,fg=#5fb3c4,fg=#bcc0cc}}}}}}}'
set -g @workbench-agent-window-current-number-style '#{?#{||:#{==:#{@agent-state},waiting},#{==:#{@agent-state},needs-input}},fg=#d6a65d,#{?#{||:#{==:#{@agent-state},blocked},#{==:#{@agent-state},error}},fg=#ff5c57,#{?#{==:#{@agent-state},done},fg=#9ece6a,#{?#{||:#{==:#{@agent-state},running},#{==:#{@agent-state},busy}},fg=#5fb3c4,#{?#{||:#{==:#{@agent-state},idle},#{==:#{@agent-state},ready}},fg=#bcc0cc,fg=#1e66f5}}}}}'
set -g window-status-current-style 'fg=#1e66f5,bg=default,bold'
set -g window-status-format '#[#{E:@workbench-agent-window-number-style},bg=default,#{?#{@agent-home-session},underscore,nounderscore}]#I#[#{E:@workbench-agent-window-number-style},bg=default,nounderscore]: #[fg=#bcc0cc,bg=default,bold,nounderscore]#W#[fg=#f3f4f8,bg=default,nounderscore] '
set -g window-status-current-format '#[#{E:@workbench-agent-window-current-number-style},bg=default,bold,#{?#{@agent-home-session},underscore,nounderscore}]#I#[#{E:@workbench-agent-window-current-number-style},bg=default,bold,nounderscore]: #[fg=#1f232e,bg=default,bold,nounderscore]#W#[fg=#e6ebf5,bg=default,nounderscore] '
set -g window-status-last-style 'fg=#5c5f77,bg=default'
set -g window-status-activity-style 'fg=#1487d6,bg=default'
set -g window-status-bell-style 'fg=#9a6700,bg=default'
set -g pane-border-style 'fg=#8c8fa1'
set -g pane-active-border-style 'fg=#1e66f5'
set -g message-command-style "bg=default,fg=#5c5f77"
set -g message-style "bg=default,fg=#5c5f77"
set -g mode-style "bg=#e6e9ef,fg=#4c4f69"
