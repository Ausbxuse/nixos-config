repos:
  - repo: local
    hooks:
      - id: nix-flake-check
        name: nix flake check
        entry: nix flake check
        language: system
        pass_filenames: false
      - id: shellcheck
        name: shellcheck
        entry: bash -c 'nix build ".#checks.$(nix eval --raw --impure --expr builtins.currentSystem).shellcheck" --no-link'
        language: system
        pass_filenames: false
